---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  dependsOn:
    - name: secrets-store-csi-driver
  values:
    oauthSecretVolume:
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: tailscale-operator-oauth-secret